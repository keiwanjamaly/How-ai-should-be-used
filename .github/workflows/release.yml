name: Release On Version Bump

on:
  push:
    branches:
      - main
      - develop
    paths:
      - package.json
      - manifest.json
      - versions.json

permissions:
  contents: write

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  release:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 2

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Detect version bump
        id: version
        run: |
          node <<'EOF'
          const fs = require('fs');
          const { execSync } = require('child_process');

          const semverPattern = /^\d+\.\d+\.\d+(?:-[0-9A-Za-z.-]+)?$/;
          const packageJson = JSON.parse(fs.readFileSync('package.json', 'utf8'));
          const manifest = JSON.parse(fs.readFileSync('manifest.json', 'utf8'));
          const versions = JSON.parse(fs.readFileSync('versions.json', 'utf8'));
          const version = packageJson.version;

          if (!semverPattern.test(version)) {
            throw new Error(`package.json version must use semantic versioning, received: ${version}`);
          }

          if (manifest.version !== version) {
            throw new Error(`manifest.json version ${manifest.version} does not match ${version}`);
          }

          if (versions[version] !== manifest.minAppVersion) {
            throw new Error(`versions.json entry for ${version} must equal minAppVersion ${manifest.minAppVersion}`);
          }

          if (manifest.isDesktopOnly !== true) {
            throw new Error('manifest.json must keep isDesktopOnly set to true');
          }

          let previousVersion = null;
          try {
            previousVersion = JSON.parse(execSync('git show HEAD^:package.json', { encoding: 'utf8' })).version;
          } catch (error) {
            previousVersion = null;
          }

          const shouldRelease = previousVersion !== version;
          const output = [
            `version=${version}`,
            `previous_version=${previousVersion || ''}`,
            `should_release=${shouldRelease ? 'true' : 'false'}`,
          ].join('\n');

          fs.appendFileSync(process.env.GITHUB_OUTPUT, `${output}\n`);

          if (!shouldRelease) {
            console.log(`Version unchanged at ${version}; skipping release.`);
          } else {
            console.log(`Detected version bump from ${previousVersion || 'none'} to ${version}.`);
          }
          EOF

      - name: Stop if version did not change
        if: steps.version.outputs.should_release != 'true'
        run: exit 0

      - name: Check whether release already exists
        if: steps.version.outputs.should_release == 'true'
        id: release_exists
        env:
          GH_TOKEN: ${{ github.token }}
          RELEASE_VERSION: ${{ steps.version.outputs.version }}
        run: |
          if gh release view "$RELEASE_VERSION" >/dev/null 2>&1; then
            echo "Release $RELEASE_VERSION already exists; skipping."
            echo "exists=true" >> "$GITHUB_OUTPUT"
          else
            echo "exists=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Type check
        if: steps.version.outputs.should_release == 'true' && steps.release_exists.outputs.exists != 'true'
        run: npm run check

      - name: Run tests
        if: steps.version.outputs.should_release == 'true' && steps.release_exists.outputs.exists != 'true'
        run: npm test

      - name: Build plugin
        if: steps.version.outputs.should_release == 'true' && steps.release_exists.outputs.exists != 'true'
        run: npm run build

      - name: Verify release assets
        if: steps.version.outputs.should_release == 'true' && steps.release_exists.outputs.exists != 'true'
        run: |
          test -f manifest.json
          test -f main.js
          test -f styles.css

      - name: Create release notes
        if: steps.version.outputs.should_release == 'true' && steps.release_exists.outputs.exists != 'true'
        env:
          RELEASE_VERSION: ${{ steps.version.outputs.version }}
        run: |
          cat > release-notes.md <<EOF
          Early desktop-only release for testers.

          Branch: ${GITHUB_REF_NAME}
          Version: ${RELEASE_VERSION}

          Assets:
          - manifest.json
          - main.js
          - styles.css
          EOF

      - name: Create GitHub release
        if: steps.version.outputs.should_release == 'true' && steps.release_exists.outputs.exists != 'true'
        env:
          GH_TOKEN: ${{ github.token }}
          RELEASE_VERSION: ${{ steps.version.outputs.version }}
        run: |
          EXTRA_ARGS=""
          if [[ "$RELEASE_VERSION" == 0.* ]] || [[ "$RELEASE_VERSION" == *-* ]] || [ "$GITHUB_REF_NAME" != "main" ]; then
            EXTRA_ARGS="--prerelease"
          fi

          gh release create "$RELEASE_VERSION" \
            manifest.json main.js styles.css \
            --target "$GITHUB_SHA" \
            --title "$RELEASE_VERSION" \
            --notes-file release-notes.md \
            $EXTRA_ARGS
